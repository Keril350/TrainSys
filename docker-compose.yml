services:
  db:
    image: postgres:15
    container_name: trains_db
    restart: always
    environment:
      POSTGRES_DB: TrainDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: